name: validate

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate marketplace.json and every plugin.json
        run: bash scripts/validate-marketplace.sh
      - name: Build + verify skill symlink farm (.agents/skills, .kiro/skills)
        # The farm is generated output (git-ignored), so build it first, then verify it resolves cleanly.
        run: bash scripts/sync-skills.sh && bash scripts/sync-skills.sh --check
      - name: Validate canonical slug rule (drift + correctness)
        run: bash tests/validate-slug-rule.sh
      - name: Reframe helper contract smoke test (CLI + JSON keys + exit codes)
        run: bash tests/validate-reframe-helpers.sh
      - name: Fingerprint coverage (Phase 3 + reference)
        run: bash tests/validate-fingerprinting.sh
