<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>learn</title>
  <style>
    :root {
      --bg:#ffffff;--surface:#f8f9fa;--border:#e9ecef;
      --text:#212529;--muted:#6c757d;--accent:#0066cc;
      --code-bg:#f1f3f5;--success:#198754;--warning:#fd7e14;
      --quiz-bg:#f0f7ff;--mistake-bg:#fff8f0;
    }
    @media (prefers-color-scheme:dark){
      :root{
        --bg:#0d1117;--surface:#161b22;--border:#30363d;
        --text:#e6edf3;--muted:#8b949e;--accent:#58a6ff;
        --code-bg:#1e2530;--success:#3fb950;--warning:#d29922;
        --quiz-bg:#0d2137;--mistake-bg:#1a1200;
      }
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
    .layout{max-width:780px;margin:0 auto;padding:2rem 1.5rem}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
    .topic{font-size:1.5rem;font-weight:700}
    .meta{display:flex;gap:.75rem}
    .badge{padding:.2rem .6rem;border-radius:999px;font-size:.75rem;font-weight:600;border:1px solid var(--border);color:var(--muted)}
    .section{margin-bottom:2rem}
    .section-title{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.5rem}
    .why{background:var(--surface);border-left:3px solid var(--accent);padding:.75rem 1rem;border-radius:0 6px 6px 0}
    .code-wrap{position:relative}
    .code-block{background:var(--code-bg);border-radius:8px;padding:1rem;font-family:"SF Mono",Consolas,monospace;font-size:.9rem;overflow-x:auto;border:1px solid var(--border);white-space:pre-wrap;word-break:break-all}
    .copy-btn{position:absolute;top:.5rem;right:.5rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:.2rem .5rem;font-size:.75rem;cursor:pointer;color:var(--muted)}
    .copy-btn:hover{color:var(--text)}
    .copy-btn.ok{color:var(--success)}
    .mistakes{background:var(--mistake-bg);border-radius:8px;padding:1rem;border:1px solid var(--border)}
    .mistakes ul{padding-left:1.2rem}
    .mistakes li{margin-bottom:.4rem}
    .generate{background:var(--surface);border-radius:8px;padding:1rem;border:1px solid var(--border);font-weight:500}
    .quiz{background:var(--quiz-bg);border-radius:8px;padding:1.25rem;border:1px solid var(--border)}
    .q{margin-bottom:1.5rem}
    .q:last-child{margin-bottom:0}
    .q-text{font-weight:600;margin-bottom:.75rem}
    .options{display:flex;flex-direction:column;gap:.4rem}
    .opt{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;border-radius:6px;border:1px solid var(--border);cursor:pointer;background:var(--bg)}
    .opt:hover{border-color:var(--accent)}
    .opt.sel{border-color:var(--accent);background:var(--quiz-bg)}
    .opt.ok{border-color:var(--success);background:color-mix(in srgb,var(--success) 10%,transparent)}
    .opt.bad{border-color:var(--warning);background:color-mix(in srgb,var(--warning) 10%,transparent)}
    .exp{margin-top:.5rem;padding:.5rem .75rem;border-radius:6px;font-size:.9rem;background:var(--surface);display:none}
    .fill-in{width:100%;padding:.5rem .75rem;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:1rem}
    .explain-ta{width:100%;min-height:80px;padding:.5rem .75rem;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:.95rem;resize:vertical}
    .btn{margin-top:.5rem;padding:.4rem .9rem;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:.9rem}
    .resources{display:flex;flex-direction:column;gap:.5rem}
    .res-link{display:flex;align-items:center;justify-content:space-between;text-decoration:none;color:var(--accent);padding:.5rem .75rem;border-radius:6px;border:1px solid var(--border);background:var(--surface)}
    .res-link:hover{border-color:var(--accent)}
    .res-meta{font-size:.75rem;color:var(--muted)}
    .ai-badge{color:var(--warning)}
    .next-section{border-top:1px solid var(--border);padding-top:1.5rem;margin-top:2rem}
    .caveat{margin-top:2rem;padding:.75rem 1rem;background:var(--surface);border-radius:6px;font-size:.82rem;color:var(--muted);border:1px solid var(--border)}
    .waiting{display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--muted)}
  </style>
</head>
<body>
<div class="layout" id="root"><div class="waiting">Waiting for a lesson… Run <code>/learn [topic]</code> in Claude Code.</div></div>

<script id="lesson-data" type="application/json">null</script>
<script>
const sse=new EventSource('/events/stream');
sse.onmessage=()=>location.reload();

function post(type,payload){
  fetch('/events',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({type,...payload,ts:Date.now()})}).catch(()=>{});
}

function copyCode(btn,code){
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent='copied';btn.classList.add('ok');
    setTimeout(()=>{btn.textContent='copy';btn.classList.remove('ok');},1500);
  }).catch(()=>{});
}

function selectOpt(el,qi,chosen,correct,explanation){
  const opts=document.querySelectorAll('[data-qi="'+qi+'"]');
  opts.forEach(o=>o.onclick=null);
  const isCorrect=chosen===correct;
  el.classList.add(isCorrect?'ok':'bad');
  if(!isCorrect) opts.forEach(o=>{if(o.dataset.val===correct)o.classList.add('ok');});
  const exp=document.getElementById('exp-'+qi);
  if(exp){exp.style.display='block';}
  post('quiz_answer',{qi,chosen,correct,result:isCorrect?'correct':'wrong'});
}

function checkFill(qi,correct,explanation){
  const input=document.getElementById('fill-'+qi);
  const val=input.value.trim().toLowerCase();
  const ok=val===correct.toLowerCase()||correct.toLowerCase().includes(val)&&val.length>2;
  input.style.borderColor=ok?'var(--success)':'var(--warning)';
  const exp=document.getElementById('exp-'+qi);
  if(exp){exp.style.display='block';}
  post('quiz_answer',{qi,chosen:val,correct,result:ok?'correct':'wrong'});
}

function revealExplain(qi){
  const exp=document.getElementById('exp-'+qi);
  if(exp){exp.style.display='block';}
  post('quiz_reveal',{qi});
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s) { return esc(s).replace(/"/g, '&quot;'); }
function safeUrl(u) {
  try {
    const p = new URL(u);
    return (p.protocol === 'https:' || p.protocol === 'http:') ? u : '#';
  } catch { return '#'; }
}

function renderQuiz(quiz){
  return quiz.map((q,qi)=>{
    if(q.type==='multiple_choice'){
      const opts=(q.options||[]).map(o=>
        `<div class="opt" data-qi="${qi}" data-val="${escAttr(o)}"
          onclick="selectOpt(this,${qi},${JSON.stringify(o)},${JSON.stringify(q.answer)},${JSON.stringify(q.explanation)})">
          <span>${esc(o)}</span></div>`).join('');
      return `<div class="q"><div class="q-text">${qi+1}. ${esc(q.question)}</div>
        <div class="options">${opts}</div>
        <div class="exp" id="exp-${qi}">${esc(q.explanation)}</div></div>`;
    }
    if(q.type==='fill_blank'){
      return `<div class="q"><div class="q-text">${qi+1}. ${esc(q.question)}</div>
        <input class="fill-in" id="fill-${qi}" placeholder="Your answer…"/>
        <button class="btn" onclick="checkFill(${qi},${JSON.stringify(q.answer)},${JSON.stringify(q.explanation)})">Check</button>
        <div class="exp" id="exp-${qi}">${esc(q.explanation)}</div></div>`;
    }
    return `<div class="q"><div class="q-text">${qi+1}. ${esc(q.question)}</div>
      <textarea class="explain-ta" id="explain-${qi}" placeholder="Write your explanation…"></textarea>
      <button class="btn" onclick="revealExplain(${qi})">See model answer</button>
      <div class="exp" id="exp-${qi}"><strong>Model answer:</strong> ${esc(q.answer)}<br><br>${esc(q.explanation)}</div></div>`;
  }).join('');
}

const data=JSON.parse(document.getElementById('lesson-data').textContent);
if(!data){document.getElementById('root').innerHTML='<div class="waiting">Waiting for a lesson… Run <code>/learn [topic]</code> in Claude Code.</div>'; }
else{
  const ex=data.example||{};
  const codeHtml=ex.code
    ?`<div class="code-wrap"><pre class="code-block">${esc(ex.code)}</pre>
       <button class="copy-btn" onclick="copyCode(this,${JSON.stringify(ex.code)})">copy</button></div>`
    :`<p>${esc(ex.prose||'')}</p>`;

  const mistakes=(data.common_mistakes||[]).map(m=>`<li>${esc(m)}</li>`).join('');

  const resources=(data.resources||[]).map(r=>`
    <a class="res-link" href="${safeUrl(r.url)}" target="_blank" rel="noopener noreferrer">
      <span>${esc(r.title)}</span>
      <span class="res-meta">${esc(r.type)}${r.source==='ai-suggested'?' <span class="ai-badge">(AI-suggested, verify)</span>':''}</span>
    </a>`).join('');

  document.getElementById('root').innerHTML=`
    <div class="header">
      <div class="topic">${esc(data.topic)}</div>
      <div class="meta">
        <span class="badge">${esc(data.level)}</span>
        <span class="badge">~${esc(String(data.estimated_minutes))} min</span>
      </div>
    </div>
    <div class="section"><div class="section-title">Concept</div><p>${esc(data.concept)}</p></div>
    <div class="section"><div class="section-title">Why it matters</div><div class="why">${esc(data.why)}</div></div>
    <div class="section">
      <div class="section-title">Example${ex.language?' — '+esc(ex.language):''}</div>
      ${codeHtml}
    </div>
    <div class="section"><div class="section-title">Common mistakes</div><div class="mistakes"><ul>${mistakes}</ul></div></div>
    <div class="section"><div class="section-title">Generate</div><div class="generate">${esc(data.generate_task)}</div></div>
    <div class="section"><div class="section-title">Quiz</div><div class="quiz">${renderQuiz(data.quiz||[])}</div></div>
    <div class="section"><div class="section-title">Resources</div><div class="resources">${resources}</div></div>
    <div class="next-section">
      <div class="section-title">What to explore next</div>
      <p>When you're ready: ${esc(data.next||'keep exploring!')}</p>
    </div>
    <div class="caveat">&#9888;&#65039; This explanation is AI-generated. Verify against official documentation before using in production.</div>
  `;
}
</script>
</body>
</html>
